<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daredevil: Born Again (Season 2)</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

/* 🔥 FIXED BODY */
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start; /* 🔥 FIX */
  padding:20px 0;
  background: radial-gradient(circle,#000,#0f2027);
  overflow-y:auto; /* 🔥 SCROLL ENABLE */
}

/* Smooth scroll */
html{
  scroll-behavior:smooth;
}

/* 🔴 Glow */
body::before{
  content:'';
  position:absolute;
  width:300px;
  height:300px;
  background:red;
  filter:blur(80px);
  opacity:0.4;
  animation:pulse 4s infinite ease-in-out;
  z-index:0;
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.3);}
}

/* 🔥 PRELOADER */
#preloader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

/* 🔥 ORIGINAL LOADER */
.loader {
  --path: white;
  --dot: #f40af0;
  --duration: 3s;
  width: 44px;
  height: 44px;
  position: relative;
  display:inline-block;
  margin: 0 16px; /* ✅ PERFECT SPACING */
}

.loader:before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 50%;
  position: absolute;
  display: block;
  background: var(--dot);
  top: 37px;
  left: 19px;
  transform: translate(-18px, -18px);
  animation: dotRect var(--duration) cubic-bezier(0.785,0.135,0.15,0.86) infinite;
}

.loader svg {
  display: block;
  width: 100%;
  height: 100%;
}

.loader svg rect,
.loader svg polygon,
.loader svg circle {
  fill: none;
  stroke: var(--path);
  stroke-width: 10px;
  stroke-linejoin: round;
  stroke-linecap: round;
}

.loader svg polygon {
  stroke-dasharray: 145 76 145 76;
  animation: pathTriangle var(--duration) cubic-bezier(0.785,0.135,0.15,0.86) infinite;
}

.loader svg rect {
  stroke-dasharray: 192 64 192 64;
  animation: pathRect var(--duration) cubic-bezier(0.785,0.135,0.15,0.86) infinite;
}

.loader svg circle {
  stroke-dasharray: 150 50 150 50;
  stroke-dashoffset: 75;
  animation: pathCircle var(--duration) cubic-bezier(0.785,0.135,0.15,0.86) infinite;
}

.loader.triangle {
  width: 48px;
}

.loader.triangle:before {
  left: 21px;
  transform: translate(-10px, -18px);
  animation: dotTriangle var(--duration) cubic-bezier(0.785,0.135,0.15,0.86) infinite;
}

/* animations */
@keyframes pathTriangle {
  33% { stroke-dashoffset: 74; }
  66% { stroke-dashoffset: 147; }
  100% { stroke-dashoffset: 221; }
}

@keyframes dotTriangle {
  33% { transform: translate(0,0); }
  66% { transform: translate(10px,-18px); }
  100% { transform: translate(-10px,-18px); }
}

@keyframes pathRect {
  25% { stroke-dashoffset: 64; }
  50% { stroke-dashoffset: 128; }
  75% { stroke-dashoffset: 192; }
  100% { stroke-dashoffset: 256; }
}

@keyframes dotRect {
  25% { transform: translate(0,0); }
  50% { transform: translate(18px,-18px); }
  75% { transform: translate(0,-36px); }
  100% { transform: translate(-18px,-18px); }
}

@keyframes pathCircle {
  25% { stroke-dashoffset: 125; }
  50% { stroke-dashoffset: 175; }
  75% { stroke-dashoffset: 225; }
  100% { stroke-dashoffset: 275; }
}

/* 🩸 Rain */
.rain{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:4;
}

.rain span{
  position:absolute;
  width:2px;
  height:18px;
  background:red;
  opacity:0.6;
  animation:rainDrop linear infinite;
}

@keyframes rainDrop{
  to{ transform:translateY(110vh); }
}

/* Container */
.container{
  position:relative;
  width:100%;
  max-width:360px;
  padding:20px;
  border-radius:20px;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(10px);
  box-shadow:0 0 30px rgba(255,0,0,0.3);
  text-align:center;
  color:white;
  z-index:2;
}

/* Poster */
.poster{
  width:100%;
  border-radius:15px;
}

/* Title */
.title{
  margin-top:8px;
  color:#ff2a2a;
  text-shadow:0 0 8px red;
}

/* Heading */
h2{
  margin:10px 0;
  color:#ff3b3b;
  text-shadow:0 0 10px red;
}

/* Buttons */
.link-btn{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:rgba(255,0,0,0.2);
  color:white;
  cursor:pointer;
  transition:0.25s;
}

.link-btn:hover{
  background:red;
  transform:scale(1.03);
  box-shadow:0 0 15px red;
}

/* 📀 Floating */
.dvd{
  position:fixed;
  width:80px;
  z-index:999; /* 🔥 ensure top */
  pointer-events:none;
  filter:drop-shadow(0 0 8px red);
}

/* ⚡ Glitch */
.glitch{
  animation:glitch 2s infinite;
}

@keyframes glitch{
  0%,100%{transform:translate(0);}
  25%{transform:translate(-1px,1px);}
  50%{transform:translate(1px,-1px);}
  75%{transform:translate(-1px,0);}
}
</style>
</head>

<body>

<!-- 🔥 3 LOADER -->
<div id="preloader">

  <div class="loader">
    <svg viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="32"></circle>
    </svg>
  </div>

  <div class="loader triangle">
    <svg viewBox="0 0 86 80">
      <polygon points="43 8 79 72 7 72"></polygon>
    </svg>
  </div>

  <div class="loader">
    <svg viewBox="0 0 80 80">
      <rect x="8" y="8" width="64" height="64"></rect>
    </svg>
  </div>

</div>


<!-- 🔊 Sound -->
<audio id="bgSound" loop>
<source src="https://file.garden/aZfQ0ZO7dDZU3Ub3/Track_DD.mp3">
</audio>

<!-- 🩸 Rain -->
<div class="rain"></div>

<!-- 📀 Floating -->
<img src="https://i.postimg.cc/GpdstX3p/images.jpg" class="dvd glitch">

<div class="container">

<img src="https://i.postimg.cc/25cgyXd7/x-DUo-As-U8l-QHOOo-Rk-Fi-Buarm-ACDN.jpg" class="poster">

<div class="title"><b><big>DAREDEVIL: BORN AGAIN Season 02</big></b></div>

<h2>🌩️ Download Now</h2>

<button class="link-btn" onclick="go('ep7')"><b><big>🎬 Episode 07</big></b></button>

<button class="link-btn" onclick="go('ep7BD')"><b><big>🎬 Episode 07 [Cloud BDIX]</big></b></button>

</div>

<script>
// 🔗 Links
const links={
  ep7:"https://drive.google.com/file/d/1ujzpG9YirsHl_Jep5LRVO1Uq2BYJSeQ8/view?usp=drivesdk",
  ep7BD:"https://cdn.fsl-buckets.life/Daredevil.Born.Again.S02E07.The.Hateful.Darkness.1080p.DSNP.WEB-DL.Hindi.DDP5.1.English.DDP5.1.Atmos.H.265-4kHdHub.Com.mkv?token=b9ef2bd44e34115ee902066dd3643190_116",
};

const sound = document.getElementById("bgSound");

window.addEventListener("load",()=>{
  sound.play().catch(()=>{});

  // 🔥 hide loader
  setTimeout(()=>{
    document.getElementById("preloader").style.display="none";
  },2000);
});

document.body.addEventListener("click",()=>{
  sound.play();
},{once:true});

const rain=document.querySelector('.rain');
for(let i=0;i<30;i++){
let d=document.createElement('span');
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(Math.random()*2+1)+"s";
rain.appendChild(d);
}

const dvd=document.querySelector('.dvd');
let x=100,y=100,dx=1.5,dy=1.5;

function animate(){
const w=innerWidth-dvd.clientWidth;
const h=innerHeight-dvd.clientHeight;

x+=dx;
y+=dy;

if(x<=0||x>=w)dx*=-1;
if(y<=0||y>=h)dy*=-1;

dvd.style.transform=`translate(${x}px,${y}px)`;
requestAnimationFrame(animate);
}
animate();

function go(key){
  const url = links[key];
  if(url){
    window.open(url, '_blank');
  }
}
</script>

</body>
</html>
